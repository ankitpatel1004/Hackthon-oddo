<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AssetFlow ERP | Forgot Password</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #2563EB, #1E3A8A);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .forgot-card {

            width: 450px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .20);
            padding: 35px;

        }

        .logo {

            font-size: 60px;
            color: #2563EB;

        }

        .form-control {

            height: 50px;
            border-radius: 10px;

        }

        .input-group-text {

            background: #fff;
            border-radius: 10px 0 0 10px;

        }

        .btn {

            height: 48px;
            border-radius: 10px;
            font-weight: bold;

        }

        a {

            text-decoration: none;

        }
    </style>

</head>

<body>

    <div class="forgot-card">

        <div class="text-center">

            <i class="bi bi-key-fill logo"></i>

            <h2 class="mt-3 fw-bold">

                Forgot Password

            </h2>

            <p class="text-muted">

                Enter your registered email address.<br>
                We'll send you a password reset link.

            </p>

        </div>

        <form action="{%url 'reset_password'%}">

            {%csrf_token%}

            <div class="mb-4">

                <label class="form-label">

                    Email Address

                </label>

                <div class="input-group">

                    <span class="input-group-text">

                        <i class="bi bi-envelope-fill"></i>

                    </span>

                    <input type="email" class="form-control" placeholder="Enter your registered email" required>

                </div>

            </div>

            <div class="d-grid mb-3">

                <button type="submit" class="btn btn-primary">

                    <i class="bi bi-send-fill"></i>

                    Send Reset Link

                </button>

            </div>

            <div class="d-grid">

                <a href="{%url 'login'%}" class="btn btn-outline-secondary">

                    <i class="bi bi-arrow-left-circle"></i>

                    Back to Login

                </a>

            </div>

        </form>

        <hr>

        <div class="text-center text-muted">

            <small>

                If you don't receive an email within a few minutes,<br>
                please check your spam folder or contact your administrator.

            </small>

        </div>

    </div>

</body>

</html>
